<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Library</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card fade-up">
    <div class="auth-logo">
      <h1>Home Library</h1>
      <p>Borrow books from your neighbourhood collection</p>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input id="loginEmail" class="form-control" type="email" placeholder="jane@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="loginPassword" class="form-control" type="password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>
      <div class="auth-toggle">
        New here? <a onclick="showRegister()">Create an account</a>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" style="display:none;">
      <div class="form-group">
        <label>Full Name</label>
        <input id="regName" class="form-control" type="text" placeholder="Jane Njeri">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input id="regEmail" class="form-control" type="email" placeholder="jane@email.com">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input id="regPhone" class="form-control" type="tel" placeholder="0712345678">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="regPassword" class="form-control" type="password" placeholder="At least 6 characters">
      </div>
      <div class="alert alert-info" style="margin-bottom:16px;">
        After registering, the librarian will approve your account before you can borrow books.
      </div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">Create Account</button>
      <div class="auth-toggle">
        Already have an account? <a onclick="showLogin()">Sign in</a>
      </div>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  if (auth.isLoggedIn()) window.location.href = 'pages/browse.html';

  function showRegister() {
    document.getElementById('loginForm').style.display    = 'none';
    document.getElementById('registerForm').style.display = 'block';
  }
  function showLogin() {
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginForm').style.display    = 'block';
  }
  async function doLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { toast('Please fill in all fields', 'error'); return; }
    try {
      const data = await api.login({ email, password });
      auth.save(data);
      toast('Welcome back, ' + data.fullName + '!');
      setTimeout(() => window.location.href = 'pages/browse.html', 800);
    } catch(e) { toast(e.message, 'error'); }
  }
  async function doRegister() {
    const fullName = document.getElementById('regName').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const phone    = document.getElementById('regPhone').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!fullName || !email || !phone || !password) { toast('Please fill in all fields', 'error'); return; }
    if (password.length < 6) { toast('Password must be at least 6 characters', 'error'); return; }
    try {
      await api.register({ fullName, email, phone, password });
      toast('Account created! The librarian will approve it soon.');
      setTimeout(showLogin, 1800);
    } catch(e) { toast(e.message, 'error'); }
  }
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('loginForm').style.display !== 'none') doLogin();
    else doRegister();
  });
</script>
</body>
</html>

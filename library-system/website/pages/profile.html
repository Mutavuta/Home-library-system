<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile – Home Library</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand">Home Library</div>
  <div class="navbar-links">
    <a href="browse.html">Browse</a>
    <a href="my-holds.html">My Holds</a>
    <a href="my-loans.html">My Loans</a>
    <a href="notifications.html">🔔</a>
    <a href="profile.html" class="active">Profile</a>
  </div>
  <div class="navbar-user">
    <span id="userName"></span>
    <button class="btn btn-outline btn-sm" onclick="auth.logout()">Logout</button>
  </div>
</nav>

<div class="container" style="max-width:560px;">
  <div class="page-header">
    <h1>My Profile</h1>
    <p>Manage your account details</p>
  </div>

  <div class="card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:56px;background:var(--primary-light);border-radius:50%;
                  width:96px;height:96px;display:flex;align-items:center;
                  justify-content:center;margin:0 auto 12px;">👤</div>
      <div id="statusBadge"></div>
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <input id="fullName" class="form-control" type="text">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input id="email" class="form-control" type="email" disabled
             style="opacity:.6;cursor:not-allowed;" title="Email cannot be changed">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input id="phone" class="form-control" type="tel">
    </div>
    <div class="form-group">
      <label>Account Status</label>
      <input id="status" class="form-control" disabled style="opacity:.6;cursor:not-allowed;text-transform:capitalize;">
    </div>
    <div class="form-group">
      <label>Member Since</label>
      <input id="createdAt" class="form-control" disabled style="opacity:.6;cursor:not-allowed;">
    </div>

    <button class="btn btn-primary btn-full" onclick="saveProfile()">Save Changes</button>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    if (!auth.requireLogin('../index.html')) return;
    document.getElementById('userName').textContent = auth.name();
    try {
      const u = await api.getProfile();
      document.getElementById('fullName').value  = u.fullName  || '';
      document.getElementById('email').value     = u.email     || '';
      document.getElementById('phone').value     = u.phone     || '';
      document.getElementById('status').value    = u.status    || '';
      document.getElementById('createdAt').value = fmtDate(u.createdAt);
      document.getElementById('statusBadge').innerHTML = badge(
        u.status === 'approved' ? 'available' : u.status
      );
    } catch(e) { toast(e.message, 'error'); }
  });

  async function saveProfile() {
    const fullName = document.getElementById('fullName').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    if (!fullName || !phone) { toast('Name and phone are required', 'error'); return; }
    try {
      await api.updateProfile({ fullName, phone });
      localStorage.setItem('lib_name', fullName);
      document.getElementById('userName').textContent = fullName;
      toast('Profile updated successfully');
    } catch(e) { toast(e.message, 'error'); }
  }
</script>
</body>
</html>

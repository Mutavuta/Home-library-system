# Application name - used in logs and monitoring
spring.application.name=library-backend

# Server port - access the Api at http://localhost:8080
sever.port = 8080

# All API URLs are prefixed with /api
# Example: http://localhost:8080/api/books
server.servlet.context-path = /api

# Show SQL/Firestore queris in logs during development
logging.level.com.library = DEBUG

# Path to your Firebase service account key json file
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}

# Firebase Realtime Database URL
firebase.database.url=https://home-library-database-default-rtdb.firebaseio.com

# JWT - jwt.secret must be at least 32 characters
jwt.secret=ChangeThisToYourOwnRandomSecretKeyAtLeast32CharsLong123456
# Token lifetime in milliseconds - 86400000 = 24 hours
jwt.expiration=86400000

## CORS - which website origins are allowed to call this API
cors.allowed.origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

# Days a borrower has to collect a book after their hold is approved
app.hold.expiry.days=3
# Default loan length in days when admin confirms a loan
app.loan.default.days=21